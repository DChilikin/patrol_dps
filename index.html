<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Патруль ДПС</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a2f5a 0%, #041a2c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 12px;
        }
        .game-container {
            background: #1e2e38;
            border-radius: 32px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6);
            padding: 12px 16px 20px 16px;
            width: 100%;
            max-width: 750px;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            width: 100%;
            height: auto;
            background: #1b2f24;
        }
        .game-header {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            gap: 10px;
            min-height: 52px;
        }
        .title-group {
            flex: 1;
            text-align: center;
        }
        .main-title {
            font-size: 0.87rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            color: #ffdd99;
            font-family: monospace;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 0.325rem;
            font-weight: 600;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            padding: 4px 12px;
            border-radius: 40px;
            color: #ffdb7e;
            display: inline-block;
        }
        .subtitle span {
            background: #a51c1c;
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            margin-left: 6px;
            font-size: 0.25rem;
        }
        .exit-btn, .pause-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            font-family: monospace;
            transition: none;
            flex-shrink: 0;
        }
        .exit-btn { color: #ffaa88; font-size: 0.8rem; }
        .pause-btn { 
            font-size: 0.9rem; 
            width: 100px;  /* фиксированная ширина */
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #0f1f2ad9;
            backdrop-filter: blur(8px);
            margin-top: 12px;
            padding: 4px 8px;
            border-radius: 60px;
            gap: 4px;
            flex-wrap: nowrap;
        }
        .score-box, .multiplier-box, .invincible-box, .record-box {
            background: #00000077;
            padding: 2px 6px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.5rem;
            flex: 1;
            justify-content: center;
            white-space: nowrap;
            color: white;
        }
        .badge {
            background: #ffaa33;
            color: #1e2a2e;
            border-radius: 30px;
            padding: 1px 5px;
            font-size: 0.5rem;
        }
        .controls-hint {
            font-size: 0.65rem;
            margin-top: 10px;
            color: #c6e2ff;
            background: #00000066;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            text-align: center;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4000;
        }
        .modal-card {
            background: #11212e;
            border-radius: 40px;
            padding: 24px;
            width: 320px;
            text-align: center;
            border: 2px solid #ffaa55;
            color: white;
        }
        .modal-card input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #1e3a4a;
            border: 1px solid #ffaa55;
            border-radius: 30px;
            color: white;
            text-align: center;
            font-family: monospace;
        }
        .modal-card button {
            background: #d92525;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            margin: 8px;
            cursor: pointer;
            font-family: monospace;
        }
        .modal-card button.secondary { background: #2a5a6a; }
        .modal-card .guest-btn { background: #2a6b2a; }
        .error-msg { color: #ffaa88; font-size: 0.8rem; margin: 5px 0; }
        .rating-list {
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
            margin: 15px 0;
            font-size: 0.8rem;
        }
        .rating-item { padding: 5px; border-bottom: 1px solid #3a5a6a; color: white; }
        .top1 { background: #ffd70022; color: gold; font-weight: bold; }
        .top2 { background: #c0c0c022; color: silver; font-weight: bold; }
        .top3 { background: #cd7f3222; color: #cd7f32; font-weight: bold; }
        /* Индикатор загрузки */
        .loading-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #ffdd99;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1rem;
            z-index: 5000;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer" style="display: none;">
    <div class="game-header">
        <button class="exit-btn" id="exitBtn">🚪 Выйти</button>
        <div class="title-group">
            <div class="main-title">ПАТРУЛЬ ДПС</div>
            <div class="subtitle">by Chilikin <span>разработчик</span></div>
        </div>
        <button class="pause-btn" id="pauseBtn">⏸️ ПАУЗА</button>
    </div>
    <canvas id="gameCanvas" width="1000" height="700"></canvas>
    <div class="stats-panel">
        <div class="score-box">📊 ЖЕЗЛОВ: <span id="scoreValue">0</span></div>
        <div class="record-box">🏆 РЕКОРД: <span id="recordValue">0</span></div>
        <div class="multiplier-box">✨ РЕЖИМ: <span id="multiplierBadge" class="badge">x1</span></div>
        <div class="invincible-box">🛡️ БРОНЯ: <span id="invincibleBadge">НЕТ</span></div>
    </div>
    <div style="text-align: center; margin-top: 10px;">
        <div class="controls-hint">👆 КАСАЙСЯ ЛЕВОЙ / ПРАВОЙ ПОЛОВИНЫ ЭКРАНА</div>
        <button id="ratingBtn" style="background:#000000aa; border:none; color:white; border-radius:40px; padding:4px 12px; margin-top:6px;">🏆 РЕЙТИНГ ТОП-100</button>
    </div>
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyurVIUa9bFMFV9lBxU3sUUcbnhTIA8d34J1hRKESSiVsVbnKVupZUkNUpdQAa7W8RUYA/exec';
    const API_SECRET = 'my_super_secret_key_123';
    // =================================================

    // Индикатор загрузки
    let loadingDiv = null;
    function showLoading() {
        if (loadingDiv) loadingDiv.remove();
        loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading-indicator';
        loadingDiv.innerText = '⏳ ПОДОЖДИТЕ...';
        document.body.appendChild(loadingDiv);
    }
    function hideLoading() {
        if (loadingDiv) {
            loadingDiv.remove();
            loadingDiv = null;
        }
    }

    // JSONP-запрос (обходит CORS)
    function jsonpRequest(action, data, callback) {
        const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        window[callbackName] = function(response) {
            delete window[callbackName];
            document.body.removeChild(script);
            callback(response);
        };
        let url = `${SCRIPT_URL}?action=${action}&secret=${API_SECRET}&callback=${callbackName}`;
        for (let key in data) {
            if (data[key] !== undefined && data[key] !== null) {
                url += `&${key}=${encodeURIComponent(data[key])}`;
            }
        }
        const script = document.createElement('script');
        script.src = url;
        document.body.appendChild(script);
    }

    function apiRequest(action, data = {}) {
        return new Promise((resolve) => {
            jsonpRequest(action, data, resolve);
        });
    }

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function registerUser(login, password, confirm) {
        if (!login || !password) return "Заполните все поля";
        if (password !== confirm) return "Пароли не совпадают";
        login = login.toLowerCase();
        const hashed = await hashPassword(password);
        showLoading();
        const result = await apiRequest('register', { login, passwordHash: hashed });
        hideLoading();
        return result.success ? null : (result.error || "Ошибка регистрации");
    }

    // Храним текущий рекорд авторизованного пользователя в переменной
    let currentUserRecord = 0;

    async function loginUser(login, password) {
        login = login.toLowerCase();
        const hashed = await hashPassword(password);
        showLoading();
        const result = await apiRequest('login', { login, passwordHash: hashed });
        hideLoading();
        if (result.success) {
            currentUserRecord = result.record || 0;
            return { success: true, record: currentUserRecord };
        } else {
            return { success: false, error: result.error || "Ошибка входа" };
        }
    }

    async function updateUserRecord(login, newRecord) {
        if (!login) return;
        login = login.toLowerCase();
        showLoading();
        const result = await apiRequest('update_score', { login, newScore: newRecord });
        hideLoading();
        if (result.success && newRecord > currentUserRecord) {
            currentUserRecord = newRecord;
        }
        return result;
    }

    async function getTopPlayers() {
        showLoading();
        const result = await apiRequest('get_top', {});
        hideLoading();
        return result.success ? result.top : [];
    }

    // ==================== ИГРОВАЯ ЛОГИКА ====================
    let currentUser = null;
    let guestMode = false;
    let gameRunning = false;
    let isPaused = false;
    let animationId = null;
    let score = 0;
    let currentSpeedKmh = 60;
    let currentSpeed = 3.2;
    let frameCounter = 0;
    let dynamicSpawnGap = 55;
    let invincibleActive = false;
    let invincibleFramesLeft = 0;
    let multiplierActive = false;
    let multiplierTimer = 0;
    let roadObjects = [];
    let currentLane = 1;
    const GAME_WIDTH = 1000;
    const GAME_HEIGHT = 700;
    const LANE_WIDTH = 300;
    const LEFT_OFFSET = 50;
    const LANE_POSITIONS = [LEFT_OFFSET + LANE_WIDTH/2, LEFT_OFFSET + LANE_WIDTH/2 + LANE_WIDTH, LEFT_OFFSET + LANE_WIDTH/2 + 2*LANE_WIDTH];
    const CAR_WIDTH = 126;
    const CAR_HEIGHT = 144;
    const CAR_Y = GAME_HEIGHT - CAR_HEIGHT - 25;
    const TYPE_STAFF = 'staff', TYPE_PIT = 'pit', TYPE_BUMP = 'bump', TYPE_VEST = 'vest', TYPE_MULTI = 'multi';
    const OBJECT_SIZES = { staff: { w: 72, h: 8 }, pit: { w: 195, h: 195 }, bump: { w: 255, h: 27 }, vest: { w: 96, h: 126 }, multi: { w: 60, h: 60 } };
    let canvas, ctx, scoreSpan, recordSpan, multiplierBadge, invincibleSpan, pauseBtn, ratingBtn, exitBtn;

    function kmhToSpeed(kmh) { return kmh * (3.2 / 60); }

    function updateSpawnGap() {
        const minSpeed = 60, maxSpeed = 250;
        const minGap = 22, maxGap = 55;
        let clampedSpeed = Math.min(maxSpeed, Math.max(minSpeed, currentSpeedKmh));
        let newGap = maxGap - ((clampedSpeed - minSpeed) / (maxSpeed - minSpeed)) * (maxGap - minGap);
        dynamicSpawnGap = Math.floor(newGap);
    }

    function updateUI() {
        scoreSpan.innerText = score;
        if (guestMode) {
            recordSpan.innerText = "—";
        } else {
            recordSpan.innerText = currentUserRecord;
        }
        multiplierBadge.innerText = multiplierActive ? 'x2' : 'x1';
        multiplierBadge.style.background = multiplierActive ? '#ffaa44' : '#ffffffcc';
        invincibleSpan.innerHTML = invincibleActive ? `${Math.ceil(invincibleFramesLeft/60)} сек 🛡️` : 'НЕТ';
    }

    function addScore(amount) {
        if (!gameRunning || isPaused) return;
        let final = multiplierActive ? amount * 2 : amount;
        score += final;
        updateUI();
    }

    function activateVest() { if (!gameRunning || isPaused) return; invincibleActive = true; invincibleFramesLeft = 300; updateUI(); }
    function activateMultiplier() { if (!gameRunning || isPaused) return; multiplierActive = true; multiplierTimer = 380; updateUI(); }

    function spawnObject() {
        if (!gameRunning || isPaused) return;
        let r = Math.random();
        let type;
        if (r < 0.55) type = TYPE_STAFF;
        else if (r < 0.82) type = Math.random() < 0.6 ? TYPE_PIT : TYPE_BUMP;
        else type = Math.random() < 0.6 ? TYPE_VEST : TYPE_MULTI;
        let lane = Math.floor(Math.random() * 3);
        let size = OBJECT_SIZES[type];
        let x = LANE_POSITIONS[lane] - size.w/2;
        roadObjects.push({ type, x, y: -size.h, w: size.w, h: size.h, angle: 0 });
    }

    function updateObjects() {
        if (!gameRunning || isPaused) return;
        const carX = LANE_POSITIONS[currentLane] - CAR_WIDTH/2;
        const carRect = { x: carX, y: CAR_Y, w: CAR_WIDTH, h: CAR_HEIGHT };
        for (let i=0; i<roadObjects.length; i++) {
            let obj = roadObjects[i];
            obj.y += currentSpeed;
            if (obj.type === TYPE_STAFF) obj.angle = (obj.angle || 0) + 0.12;
            let rect = { x: obj.x, y: obj.y, w: obj.w, h: obj.h };
            if (rect.y + rect.h > CAR_Y && rect.y < CAR_Y + CAR_HEIGHT &&
                rect.x < carRect.x + carRect.w && rect.x + rect.w > carRect.x) {
                if (obj.type === TYPE_STAFF) { addScore(1); roadObjects.splice(i,1); i--; continue; }
                else if (obj.type === TYPE_PIT || obj.type === TYPE_BUMP) {
                    if (invincibleActive) { roadObjects.splice(i,1); i--; continue; }
                    else { 
                        // Авария
                        gameRunning = false;
                        endGame(true);
                        return;
                    }
                }
                else if (obj.type === TYPE_VEST) { activateVest(); roadObjects.splice(i,1); i--; continue; }
                else if (obj.type === TYPE_MULTI) { activateMultiplier(); roadObjects.splice(i,1); i--; continue; }
            }
            if (obj.y > GAME_HEIGHT + 150) { roadObjects.splice(i,1); i--; }
        }
    }

    function updateTimers() {
        if (!gameRunning || isPaused) return;
        if (multiplierActive) { multiplierTimer--; if (multiplierTimer <= 0) { multiplierActive = false; updateUI(); } }
        if (invincibleActive) { invincibleFramesLeft--; if (invincibleFramesLeft <= 0) { invincibleActive = false; updateUI(); } else updateUI(); }
    }

    function updateSpeedByTime() {
        if (!gameRunning || isPaused) return;
        if (frameCounter % 300 === 0 && frameCounter !== 0) {
            if (currentSpeedKmh < 250) {
                currentSpeedKmh = Math.min(250, currentSpeedKmh + 10);
                currentSpeed = kmhToSpeed(currentSpeedKmh);
                updateSpawnGap();
            }
        }
    }

    function trySpawn() {
        if (!gameRunning || isPaused) return;
        frameCounter++;
        updateSpeedByTime();
        let currentGap = Math.max(22, dynamicSpawnGap - Math.floor(score / 200));
        if (frameCounter % currentGap === 0) {
            spawnObject();
            if (Math.random() < 0.2 && currentSpeedKmh > 100) spawnObject();
        }
    }

    function drawRoad() {
        ctx.fillStyle = "#2a3a2e"; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.fillStyle = "#1f2c24"; ctx.fillRect(LEFT_OFFSET, 0, GAME_WIDTH - 2*LEFT_OFFSET, GAME_HEIGHT);
        ctx.fillStyle = "#ad9e6b"; ctx.fillRect(LEFT_OFFSET-5, 0, 5, GAME_HEIGHT); ctx.fillRect(GAME_WIDTH-LEFT_OFFSET, 0, 5, GAME_HEIGHT);
        ctx.beginPath(); ctx.strokeStyle = "#f9f3cf"; ctx.lineWidth = 5; ctx.setLineDash([25, 30]);
        for (let i = 1; i < 3; i++) { let lineX = LEFT_OFFSET + i * LANE_WIDTH; ctx.beginPath(); ctx.moveTo(lineX, 0); ctx.lineTo(lineX, GAME_HEIGHT); ctx.stroke(); }
        ctx.setLineDash([]);
    }
    function drawStaff(x,y,w,h,angle) { ctx.save(); ctx.translate(x+w/2,y+h/2); ctx.rotate(Math.sin(angle)*0.5); ctx.fillStyle="#111"; ctx.fillRect(-w/2,-h/2,w,h); let step=w/12; for(let i=0;i<12;i++){ ctx.fillStyle=(i%2===0)?"#f4f4f4":"#111"; ctx.fillRect(-w/2+i*step,-h/2,step-0.5,h); } ctx.restore(); }
    function drawBump(x,y,w,h) { ctx.fillStyle="#555"; ctx.fillRect(x,y+6,w,h); ctx.fillStyle="#FFCC00"; ctx.fillRect(x,y+6,9,h); ctx.fillRect(x+w-9,y+6,9,h); ctx.fillStyle="#777"; for(let i=0;i<6;i++) ctx.fillRect(x+18+i*38,y+12,9,h-12); }
    function drawPit(x,y,w,h) { let cx=x+w/2, cy=y+h/2; ctx.beginPath(); ctx.ellipse(cx,cy,w/2,h/2.2,0,0,Math.PI*2); ctx.fillStyle="#2b2b2b"; ctx.fill(); ctx.beginPath(); ctx.ellipse(cx,cy+3,w/2-12,h/2.8,0,0,Math.PI*2); ctx.fillStyle="#111"; ctx.fill(); ctx.fillStyle="#5a4a3a"; ctx.fillRect(x+30,y+18,12,5); ctx.fillRect(x+w-60,y+27,18,5); ctx.fillRect(x+75,y+h-18,30,3); }
    function drawVest(x,y,w,h) { ctx.fillStyle="#1a2b4c"; ctx.fillRect(x,y,w,h); ctx.fillStyle="#c0c0c0"; ctx.fillRect(x+12,y+18,w-24,12); ctx.fillRect(x+12,y+h-24,w-24,12); ctx.fillStyle="#FFCC00"; ctx.fillRect(x+30,y+42,36,24); ctx.fillStyle="#000"; ctx.font="bold 20px monospace"; ctx.fillText("ДПС",x+38,y+63); ctx.fillStyle="#2a3d6e"; ctx.fillRect(x+12,y+78,24,24); ctx.fillRect(x+w-36,y+78,24,24); ctx.fillStyle="#aaa"; ctx.fillRect(x+3,y+57,9,12); ctx.fillRect(x+w-12,y+57,9,12); }
    function drawMulti(x,y,w,h) { ctx.font="bold 42px monospace"; ctx.fillStyle="#FF0000"; ctx.fillText("X",x+6,y+45); ctx.fillStyle="#FFFF00"; ctx.fillText("2",x+33,y+48); }
    function drawCar(x,y) { ctx.fillStyle="#f5f5f5"; ctx.fillRect(x+12,y+30,102,108); ctx.fillStyle="#3a4f66"; ctx.fillRect(x+27,y+42,27,42); ctx.fillRect(x+72,y+42,27,42); ctx.fillStyle="#1f4880"; ctx.fillRect(x+12,y+90,102,18); ctx.fillStyle="#fff"; ctx.font="bold 15px monospace"; ctx.fillText("ДПС",x+48,y+105); ctx.font="12px monospace"; ctx.fillStyle="#ffdd99"; ctx.fillText("ПОЛИЦИЯ",x+39,y+117); ctx.fillStyle="#d33"; ctx.fillRect(x+18,y+78,15,18); ctx.fillRect(x+93,y+78,15,18); ctx.fillStyle="#fff"; ctx.fillRect(x+42,y+132,42,12); ctx.fillStyle="#000"; ctx.font="9px monospace"; ctx.fillText("A123BC",x+45,y+143); let red=(Math.sin(Date.now()*0.015)>0)?"#f44":"#faa"; let blue=(Math.sin(Date.now()*0.015+2)>0)?"#44f":"#aaf"; ctx.fillStyle=red; ctx.fillRect(x+30,y+12,18,12); ctx.fillStyle=blue; ctx.fillRect(x+78,y+12,18,12); ctx.fillStyle="rgba(255,0,0,0.3)"; ctx.fillRect(x+27,y+6,24,6); ctx.fillStyle="rgba(0,0,255,0.3)"; ctx.fillRect(x+75,y+6,24,6); ctx.fillStyle="#222"; ctx.fillRect(x+18,y+135,21,12); ctx.fillRect(x+87,y+135,21,12); }
    function drawSpeedometer() { const x=GAME_WIDTH-200, y=15, r=33; ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.fillStyle="#1a1a1a"; ctx.fill(); ctx.strokeStyle="#ddd"; ctx.stroke(); for(let i=0;i<=10;i++){ let ang=-Math.PI/2+(i/10)*Math.PI; let x1=x+r+Math.cos(ang)*(r-6); let y1=y+r+Math.sin(ang)*(r-6); let x2=x+r+Math.cos(ang)*(r-12); let y2=y+r+Math.sin(ang)*(r-12); ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.strokeStyle="#ccc"; ctx.stroke(); } let ang=-Math.PI/2+(currentSpeedKmh/250)*Math.PI; let ax=x+r+Math.cos(ang)*(r-12); let ay=y+r+Math.sin(ang)*(r-12); ctx.beginPath(); ctx.moveTo(x+r,y+r); ctx.lineTo(ax,ay); ctx.strokeStyle="#f44"; ctx.lineWidth=4; ctx.stroke(); ctx.fillStyle="#ffffaa"; ctx.beginPath(); ctx.arc(x+r,y+r,5,0,Math.PI*2); ctx.fill(); ctx.font="bold 42px monospace"; ctx.fillStyle="#ffcc77"; ctx.fillText(Math.floor(currentSpeedKmh), x+r+45, y+r+12); ctx.font="18px monospace"; ctx.fillStyle="#aaa"; ctx.fillText("km/h", x+r+113, y+r+9); }
    function drawObjects() { for(let obj of roadObjects) { if(obj.type===TYPE_STAFF) drawStaff(obj.x,obj.y,obj.w,obj.h,obj.angle); else if(obj.type===TYPE_BUMP) drawBump(obj.x,obj.y,obj.w,obj.h); else if(obj.type===TYPE_PIT) drawPit(obj.x,obj.y,obj.w,obj.h); else if(obj.type===TYPE_VEST) drawVest(obj.x,obj.y,obj.w,obj.h); else if(obj.type===TYPE_MULTI) drawMulti(obj.x,obj.y,obj.w,obj.h); } }
    function drawUI() { drawSpeedometer(); if(isPaused && gameRunning){ ctx.font="bold 42px monospace"; ctx.fillStyle="#ffffaa"; ctx.fillText("ПАУЗА", GAME_WIDTH/2-80, GAME_HEIGHT/2); } }

    function gameLoop() {
        if (!gameRunning) { if (animationId) cancelAnimationFrame(animationId); return; }
        if (!isPaused) { updateTimers(); updateObjects(); trySpawn(); }
        drawRoad(); drawObjects(); drawCar(LANE_POSITIONS[currentLane] - CAR_WIDTH/2, CAR_Y); drawUI();
        animationId = requestAnimationFrame(gameLoop);
    }

    // Функция окончания игры с поддержкой аварии
    async function endGame(isCrash = false) {
        if (animationId) cancelAnimationFrame(animationId);
        if (isCrash) {
            await showMessagePromise("💥 АВАРИЯ!", "Вы столкнулись с препятствием!");
        }
        if (!guestMode && currentUser && score > 0) {
            await updateUserRecord(currentUser, score);
        }
        let finalRecord = guestMode ? "не сохраняется" : currentUserRecord;
        await showMessagePromise("🚨 КОНЕЦ СМЕНЫ", `Вы собрали ${score} жезлов. Рекорд: ${finalRecord}`);
        resetGame();
    }

    // Показ сообщения с ожиданием нажатия ОК
    function showMessagePromise(title, text) {
        return new Promise((resolve) => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-card"><h2>${title}</h2><p>${text}</p><button id="msgOkBtn">ОК</button></div>`;
            document.body.appendChild(modal);
            modal.querySelector('#msgOkBtn').onclick = () => {
                modal.remove();
                resolve();
            };
        });
    }

    function resetGame() {
        if (animationId) cancelAnimationFrame(animationId);
        gameRunning = true;
        isPaused = false;
        pauseBtn.innerText = "⏸️ ПАУЗА";
        score = 0;
        currentSpeedKmh = 60;
        currentSpeed = kmhToSpeed(60);
        frameCounter = 0;
        multiplierActive = false;
        invincibleActive = false;
        invincibleFramesLeft = 0;
        multiplierTimer = 0;
        roadObjects = [];
        currentLane = 1;
        updateSpawnGap();
        updateUI();
        function loop() {
            if (!gameRunning) return;
            if (!isPaused) { updateTimers(); updateObjects(); trySpawn(); }
            drawRoad(); drawObjects(); drawCar(LANE_POSITIONS[currentLane] - CAR_WIDTH/2, CAR_Y); drawUI();
            animationId = requestAnimationFrame(loop);
        }
        animationId = requestAnimationFrame(loop);
    }

    // Обычное сообщение (без ожидания, для правил)
    function showMessage(title, text, onClose) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h2>${title}</h2><p>${text}</p><button id="msgOkBtn">ОК</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#msgOkBtn').onclick = () => { modal.remove(); if(onClose) onClose(); };
    }

    function showRules(callback) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h2>🚓 ДОБРО ПОЖАЛОВАТЬ</h2><ul style="text-align:left;"><li>🎯 Цель: соберите как можно больше жезлов.</li><li>✨ Бонус X2 — временное удвоение очков.</li><li>⚠️ Не наезжайте на ямы и искусственные неровности.</li><li>🛡️ Бронежилет — временная неуязвимость.</li><li>📈 Скорость постоянно растёт.</li><li>👆 Управление: касания левой/правой половины экрана.</li><li>⏸️ Кнопка "Пауза" — остановить игру.</li></ul><button id="rulesOkBtn">ТАК ТОЧНО!</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#rulesOkBtn').onclick = () => { modal.remove(); if(callback) callback(); };
    }

    function showLoginForm() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h2>🚔 АВТОРИЗАЦИЯ</h2><input type="text" id="loginInput" placeholder="Логин"><input type="password" id="passInput" placeholder="Пароль"><div style="display:flex; justify-content:center; gap:10px;"><button id="loginBtn">Войти</button><button id="registerBtn">Регистрация</button></div><button id="guestBtn" class="guest-btn">Играть как гость</button><div id="authError" class="error-msg"></div></div>`;
        document.body.appendChild(modal);
        const loginInput = modal.querySelector('#loginInput');
        const passInput = modal.querySelector('#passInput');
        const loginBtn = modal.querySelector('#loginBtn');
        const registerBtn = modal.querySelector('#registerBtn');
        const guestBtn = modal.querySelector('#guestBtn');
        const errorDiv = modal.querySelector('#authError');
        loginBtn.onclick = async () => {
            errorDiv.innerText = '';
            const login = loginInput.value.trim();
            const pass = passInput.value;
            if (!login || !pass) { errorDiv.innerText = "Заполните поля"; return; }
            const result = await loginUser(login, pass);
            if (!result.success) { errorDiv.innerText = result.error; return; }
            currentUser = login;
            guestMode = false;
            modal.remove();
            showRules(() => startGameAfterAuth());
        };
        registerBtn.onclick = () => { modal.remove(); showRegisterForm(); };
        guestBtn.onclick = () => {
            currentUser = null;
            guestMode = true;
            currentUserRecord = 0;
            modal.remove();
            showRules(() => startGameAfterAuth());
        };
    }

    function showRegisterForm() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h2>📝 РЕГИСТРАЦИЯ</h2><input type="text" id="regLogin" placeholder="Логин"><input type="password" id="regPass" placeholder="Пароль"><input type="password" id="regConfirm" placeholder="Повторите пароль"><div style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"><button id="regSubmitBtn">Зарегистрироваться</button><button id="backToLoginBtn" class="secondary">Назад</button></div><div id="regError" class="error-msg"></div></div>`;
        document.body.appendChild(modal);
        const loginInput = modal.querySelector('#regLogin');
        const passInput = modal.querySelector('#regPass');
        const confirmInput = modal.querySelector('#regConfirm');
        const submitBtn = modal.querySelector('#regSubmitBtn');
        const backBtn = modal.querySelector('#backToLoginBtn');
        const errorDiv = modal.querySelector('#regError');
        submitBtn.onclick = async () => {
            errorDiv.innerText = '';
            const login = loginInput.value.trim();
            const pass = passInput.value;
            const confirm = confirmInput.value;
            const err = await registerUser(login, pass, confirm);
            if (err) { errorDiv.innerText = err; return; }
            // Автоматический вход после регистрации
            const result = await loginUser(login, pass);
            if (!result.success) { errorDiv.innerText = result.error; return; }
            currentUser = login;
            guestMode = false;
            modal.remove();
            showRules(() => startGameAfterAuth());
        };
        backBtn.onclick = () => { modal.remove(); showLoginForm(); };
    }

    async function showRatingModal() {
        // Ставим игру на паузу, если она запущена
        let wasPaused = isPaused;
        if (gameRunning && !wasPaused) {
            isPaused = true;
            pauseBtn.innerText = "▶️ ПРОДОЛЖИТЬ";
        }
        const top = await getTopPlayers();
        const modal = document.createElement('div');
        modal.className = 'modal';
        let html = `<div class="modal-card"><h2>🏆 ТОП-100 ИГРОКОВ</h2><div class="rating-list">`;
        top.forEach((p, idx) => {
            let rankClass = '';
            if (idx === 0) rankClass = 'top1';
            else if (idx === 1) rankClass = 'top2';
            else if (idx === 2) rankClass = 'top3';
            html += `<div class="rating-item ${rankClass}">${idx+1}. ${p.login} — ${p.score} жезлов</div>`;
        });
        if (top.length === 0) html += `<div>Нет зарегистрированных игроков</div>`;
        html += `</div><button id="closeRating">ЗАКРЫТЬ</button></div>`;
        modal.innerHTML = html;
        document.body.appendChild(modal);
        modal.querySelector('#closeRating').onclick = () => {
            modal.remove();
            if (gameRunning && !wasPaused) {
                isPaused = false;
                pauseBtn.innerText = "⏸️ ПАУЗА";
                updateUI();
            }
        };
    }

    function exitToAuth() {
        if (animationId) cancelAnimationFrame(animationId);
        gameRunning = false;
        document.getElementById('gameContainer').style.display = 'none';
        currentUser = null;
        guestMode = false;
        currentUserRecord = 0;
        showLoginForm();
    }

    function startGameAfterAuth() {
        const container = document.getElementById('gameContainer');
        container.style.display = 'block';
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        canvas.width = GAME_WIDTH; canvas.height = GAME_HEIGHT;
        scoreSpan = document.getElementById('scoreValue');
        recordSpan = document.getElementById('recordValue');
        multiplierBadge = document.getElementById('multiplierBadge');
        invincibleSpan = document.getElementById('invincibleBadge');
        pauseBtn = document.getElementById('pauseBtn');
        ratingBtn = document.getElementById('ratingBtn');
        exitBtn = document.getElementById('exitBtn');
        ratingBtn.onclick = () => showRatingModal();
        exitBtn.onclick = () => exitToAuth();

        updateUI();

        // ========== ИСПРАВЛЕННЫЕ ФУНКЦИИ left / right ==========
        function left() { 
            if (gameRunning && !isPaused) {
                let newLane = currentLane - 1;
                if (isNaN(newLane)) newLane = 1;
                currentLane = Math.max(0, Math.min(2, newLane));
            }
        }
        function right() { 
            if (gameRunning && !isPaused) {
                let newLane = currentLane + 1;
                if (isNaN(newLane)) newLane = 1;
                currentLane = Math.max(0, Math.min(2, newLane));
            }
        }
        // ========================================================

        // ========== ИСПРАВЛЕННЫЕ ОБРАБОТЧИКИ КАСАНИЙ ==========
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameRunning || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            const touchX = (e.touches[0].clientX - rect.left) * scaleX;
            const zone = touchX / GAME_WIDTH; // от 0 до 1
            if (zone < 0.33) {
                left();
            } else if (zone > 0.66) {
                right();
            } else {
                currentLane = 1; // явно ставим на среднюю полосу
            }
        });
        canvas.addEventListener('mousedown', (e) => {
            if (!gameRunning || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const zone = mouseX / GAME_WIDTH;
            if (zone < 0.33) {
                left();
            } else if (zone > 0.66) {
                right();
            } else {
                currentLane = 1;
            }
        });
        // ========================================================

        pauseBtn.onclick = () => {
            if (!gameRunning) return;
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? "▶️ ПРОДОЛЖИТЬ" : "⏸️ ПАУЗА";
            updateUI();
        };
        resetGame();
    }

    // Запуск
    showLoginForm();
</script>
</body>
</html>
